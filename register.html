<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Inscription</title>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .error-msg { color: var(--danger); font-size: 14px; margin-top: 10px; display: none; text-align: center; font-weight: 500; }
        .success-msg { color: var(--success); font-size: 14px; margin-top: 10px; display: none; text-align: center; font-weight: 500; }
        a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<div class="auth-container">
    <h2>Créer un compte TaskFlow 🚀</h2>
    <p style="color: #718096; font-size: 14px;">Plateforme collaborative pour SMI S4</p>
    
    <form id="registerForm">
        <input type="text" id="regName" placeholder="Nom complet..." required>
        <input type="email" id="regEmail" placeholder="Adresse Email..." required>
        <input type="password" id="regPassword" placeholder="Mot de passe..." required>
        <button type="submit" class="btn">S'inscrire</button>
    </form>

    <div id="errorBox" class="error-msg"></div>
    <div id="successBox" class="success-msg">L'inscription a réussi ! Redirection vers la page de connexion...</div>

    <p style="margin-top: 20px; font-size: 14px;">Vous avez déjà un compte ? <a href="/login.html">Se connecter</a></p>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const username = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        
        errorBox.style.display = 'none';
        successBox.style.display = 'none';

        try {
            
            const response = await axios.post('/api/auth/register', {
                username, 
                email,
                password
            });

            if (response.status === 201 || response.status === 200) {
                successBox.style.display = 'block';
                setTimeout(() => {
                    
                    window.location.href = '/login.html';
                }, 2000);
            }
        } catch (error) {
            errorBox.style.display = 'block';
            if (error.response) {
                errorBox.innerText = error.response.data.message || error.response.data.error || "Une erreur est survenue lors de l'inscription.";
            } else {
                errorBox.innerText = "Erreur : Impossible de contacter le serveur backend. Vérifiez qu'il est bien démarré.";
            }
        }
    });
</script>

</body>
</html>
