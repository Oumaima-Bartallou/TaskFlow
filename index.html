<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow Pro - SMI S4</title>
    <style>
        /* Styles CSS pour une interface moderne */
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: var(--dark); }
        .container { max-width: 650px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin: auto; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Notification styles */
        #notification-msg { text-align: center; font-weight: bold; height: 25px; margin: 15px 0; }

        /* Task Cards styles */
        .task-card { background: #fff; border-left: 6px solid var(--primary); padding: 18px; margin-top: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .task-card.urgent { border-left-color: var(--danger); background: #fff5f5; }
        .task-card.completed { border-left-color: var(--success); opacity: 0.6; background: #f9f9f9; }
        
        .task-info { font-size: 13px; color: #718096; margin: 8px 0; }
        .actions { margin-top: 12px; display: flex; gap: 10px; }
        .btn-status { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; flex: 1; }
        .btn-delete { background: #cbd5e0; color: #4a5568; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 TaskFlow SMI S4</h2>
    
    <input type="text" id="taskTitle" placeholder="Titre de la tâche...">
    <textarea id="taskDesc" placeholder="Description détaillée..."></textarea>
    <select id="taskPriority">
        <option value="Normal">🟢 Priorité: Normal</option>
        <option value="Urgent">🔴 Priorité: URGENT</option>
    </select>
    <button class="btn-add" onclick="addTask()">Ajouter au planning</button>
    
    <div id="notification-msg"></div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTasks()" placeholder="🔍 Rechercher une tâche...">
    </div>

    <div id="taskList"></div>

    <div class="filter-section" style="margin-top: 30px;">
        <h3>⏳ Fil d'activités du Projet</h3>
        <div id="activityFeed" style="max-height: 200px; overflow-y: auto; padding: 12px; background: #fff; border-radius: 10px; border: 2px solid #edf2f7;">
            <p style="text-align:center; color:#718096;"><i>Aucune activité récente.</i></p>
        </div>
    </div>
</div>

<script>
    
    const token = localStorage.getItem('token') || "dummy-token"; 
    const API_TASKS_URL = "http://127.0.0.1:3000/api/tasks";
    const currentProjectId = "66463e2a9b1c2d3e4f5a6b7c"; 

    // Initialisation : Charger les tâches depuis le LocalStorage ou créer un tableau vide
    let myTasks = JSON.parse(localStorage.getItem('my_tasks')) || [];

   
    async function addTask() {
        const title = document.getElementById('taskTitle').value;
        const desc = document.getElementById('taskDesc').value;
        const priority = document.getElementById('taskPriority').value;

        if (!title) {
            showNotification("⚠️ Le titre est obligatoire", "urgent");
            return;
        }

        const newTask = {
            id: Date.now(),
            title: title,
            description: desc,
            priority: priority,
            status: 'En cours',
            createdAt: new Date().toLocaleString(),
            completedAt: null,
            project: currentProjectId 
        };

        
        try {
            const res = await fetch(API_TASKS_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(newTask)
            });

            if (res.ok) {
                
                myTasks.unshift(newTask);
                saveAndRender();
                
                document.getElementById('taskTitle').value = "";
                document.getElementById('taskDesc').value = "";

                if (priority === 'Urgent') {
                    showNotification("🔥 Tâche URGENTE ajoutée !", "urgent");
                } else {
                    showNotification("✅ Tâche ajoutée avec succès");
                }

                
                await loadActivities(); 
            } else {
                console.error("Erreur serveur lors de l'ajout");
            }
        } catch (err) {
            console.error("Impossible de joindre le serveur, sauvegarde locale seule:", err);
            
            myTasks.unshift(newTask);
            saveAndRender();
        }
    }

    /**
     * CHANGER LE STATUT (En cours / Terminée)
     */
    function toggleStatus(id) {
        myTasks = myTasks.map(task => {
            if (task.id === id) {
                if (task.status === 'En cours') {
                    task.status = 'Terminée';
                    task.completedAt = new Date().toLocaleString();
                    showNotification("🎉 Félicitations ! Tâche terminée");
                } else {
                    task.status = 'En cours';
                    task.completedAt = null;
                    showNotification("🔄 Tâche remise en cours");
                }
            }
            return task;
        });
        saveAndRender();
    }

    /**
     * SUPPRIMER UNE TÂCHE
     */
    function deleteTask(id) {
        if (confirm("Voulez-vous supprimer cette tâche ?")) {
            myTasks = myTasks.filter(task => task.id !== id);
            saveAndRender();
            showNotification("🗑️ Tâche supprimée", "urgent");
        }
    }

    
    async function loadActivities() {
        try {
            const res = await fetch(`http://127.0.0.1:3000/api/projects/${currentProjectId}/activities`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const activities = await res.json();
                const feed = document.getElementById('activityFeed');
                
                if (activities.length === 0) {
                    feed.innerHTML = "<p style='text-align:center; color:#718096;'><i>Aucune activité récente.</i></p>";
                    return;
                }
                
                feed.innerHTML = "";
                activities.forEach(act => {
                    const date = new Date(act.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const name = act.user ? act.user.name : 'Membre';
                    
                    feed.innerHTML += `
                        <div style="font-size:13px; border-bottom:1px dashed #edf2f7; padding: 8px 0; color: #2c3e50;">
                            ⏰ <b>${date}</b> — <b>${name}</b> ${act.details}
                        </div>`;
                });
            }
        } catch (err) { 
            console.error("Erreur lors du chargement des activités:", err); 
        }
    }

    /**
     * AFFICHER LES NOTIFICATIONS VISUELLES
     */
    function showNotification(msg, type = 'success') {
        const n = document.getElementById('notification-msg');
        n.innerText = msg;
        n.style.color = (type === 'urgent') ? "#e74c3c" : "#27ae60";
        setTimeout(() => n.innerText = "", 3000);
    }

    /**
     * RECHERCHE ET FILTRAGE
     */
    function filterTasks() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.task-card');
        cards.forEach(card => {
            const content = card.innerText.toLowerCase();
            card.style.display = content.includes(text) ? 'block' : 'none';
        });
    }

    function saveAndRender() {
        localStorage.setItem('my_tasks', JSON.stringify(myTasks));
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = "";

        myTasks.forEach(task => {
            const isCompleted = task.status === 'Terminée';
            const isUrgent = task.priority === 'Urgent';

            list.innerHTML += `
                <div class="task-card ${isCompleted ? 'completed' : ''} ${isUrgent ? 'urgent' : ''}">
                    <strong>${isUrgent ? '⚠️ ' : ''}${task.title}</strong>
                    <p style="margin: 5px 0;">${task.description || '<i>Aucune description</i>'}</p>
                    
                    <div class="task-info">
                        🕒 Créée le: <b>${task.createdAt}</b><br>
                        ${task.completedAt ? `✅ Terminée le: <b>${task.completedAt}</b>` : `⏳ État: <b>${task.status}</b>`}
                    </div>
                    
                    <div class="actions">
                        <button class="btn-status" onclick="toggleStatus(${task.id})">
                            ${isCompleted ? 'Réouvrir' : 'Terminer'}
                        </button>
                        <button class="btn-delete" onclick="deleteTask(${task.id})">Supprimer</button>
                    </div>
                </div>
            `;
        });
    }

    
    window.onload = async () => {
        renderTasks();
        await loadActivities(); 
    };
</script>
</body>
</html>
