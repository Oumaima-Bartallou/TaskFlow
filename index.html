<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow Pro - Dashboard Global (F1 - F10)</title>
    <style>
        :root { 
            --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --dark: #2c3e50; --warning: #f1c40f;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: var(--dark); }
        .container { max-width: 900px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin: auto; }
        
        /* Navbar avec Cloche de Notification (F10) */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .notif-bell { position: relative; cursor: pointer; font-size: 22px; }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; font-weight: bold; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #edf2f7; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; }
        .stat-card.active-p { border-top: 4px solid var(--primary); }
        .stat-card.assigned-t { border-top: 4px solid var(--dark); }
        .stat-card.completed-t { border-top: 4px solid var(--success); }
        .stat-card.delayed-t { border-top: 4px solid var(--danger); }

        .section { border: 2px solid #edf2f7; padding: 20px; border-radius: 12px; margin-bottom: 20px; background: #fff; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
        .btn-primary { background: var(--primary); width: 100%; }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-logout { background: #718096; }

        #authSection { max-width: 450px; margin: auto; }
        .hidden { display: none !important; }
        #notification-msg { text-align: center; font-weight: bold; height: 25px; margin: 15px 0; }
        .task-card { background: #fff; border-left: 6px solid var(--primary); padding: 18px; margin-top: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .task-card.urgent { border-left-color: var(--danger); background: #fff5f5; }
        .task-card.completed { border-left-color: var(--success); opacity: 0.6; background: #f9f9f9; }
        .task-info { font-size: 13px; color: #718096; margin: 8px 0; }
        .actions { margin-top: 12px; display: flex; gap: 10px; }

        /* Style de la liste déroulante des notifs */
        .notif-dropdown { background: #fff; border: 2px solid #edf2f7; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .notif-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #edf2f7; font-size: 13px; }
    </style>
</head>
<body>

<div id="authSection" class="section">
    <h2>🔐 Connexion - TaskFlow SMI S4</h2>
    <input type="email" id="authEmail" placeholder="Adresse Email...">
    <input type="password" id="authPassword" placeholder="Mot de passe...">
    <button class="btn-primary" onclick="handleAuth()">Se connecter</button>
</div>

<div id="appSection" class="container hidden">
    
    <div class="navbar">
        <h3>🚀 TaskFlow Dashboard</h3>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="notif-bell" onclick="toggleNotifDropdown()">
                🔔 <span class="notif-badge" id="notifCount">0</span>
            </div>
            <button class="btn-logout" onclick="logout()">🚪 Quitter</button>
        </div>
    </div>

    <div id="notifDropdownSection" class="section hidden">
        <h4>🔔 Notifications Récentes (Non lues)</h4>
        <div id="notifList"></div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card active-p">Projets Actifs<br><span>1</span></div>
        <div class="stat-card assigned-t">Tâches Assignées<br><span id="statAssigned">0</span></div>
        <div class="stat-card completed-t">Tâches Terminées<br><span id="statCompleted">0</span></div>
        <div class="stat-card delayed-t">En Retard 🔥<br><span id="statDelayed">0</span></div>
    </div>

    <div id="notification-msg"></div>

    <div class="section">
        <h3>📝 Ajouter une Nouvelle Tâche</h3>
        <input type="text" id="taskTitle" placeholder="Titre de la tâche (Obligatoire)...">
        <textarea id="taskDesc" placeholder="Description de la tâche..."></textarea>
        <select id="taskPriority">
            <option value="Normal">🟢 Priorité: Normal</option>
            <option value="Urgent">🔴 Priorité: URGENT</option>
        </select>
        <button class="btn-primary" onclick="addTask()">Ajouter au planning</button>
    </div>

    <div class="section">
        <h3>🔍 Filtrage et Recherche</h3>
        <input type="text" id="searchInput" onkeyup="filterTasks()" placeholder="Rechercher par mot-clé...">
    </div>

    <h3>📋 Liste des Tâches</h3>
    <div id="taskList"></div>

    <div class="section" style="margin-top: 30px;">
        <h3>⏳ Fil d'activités du Projet (F9)</h3>
        <div id="activityFeed" style="max-height: 150px; overflow-y: auto; background: #fafafa; padding: 10px; border-radius: 8px;">
            <p style="text-align:center; color:#718096;"><i>Aucune activité récente.</i></p>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = "http://127.0.0.1:3000/api";
    let myTasks = JSON.parse(localStorage.getItem('my_tasks')) || [];
    let currentProjectId = "66463e2a9b1c2d3e4f5a6b7c";
    let unreadNotifications = [];

    function checkSession() {
        const token = localStorage.getItem('token');
        if (token) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            initApp();
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
        }
    }

    function handleAuth() {
        localStorage.setItem('token', 'dummy-token-smi');
        showNotification("🔓 Connexion réussie !");
        checkSession();
    }

    function logout() {
        localStorage.removeItem('token');
        showNotification("🚪 Déconnexion", "urgent");
        checkSession();
    }

    // ================= F10: LOGIQUE DES NOTIFICATIONS (POLLING & LOCALSTORAGE) =================
    async function fetchNotifications() {
        try {
            const res = await fetch(`${API_BASE_URL}/notifications`);
            if (res.ok) {
                unreadNotifications = await res.json();
                updateNotifUI();
            }
        } catch (err) { console.error("Erreur Polling:", err); }
    }

    function updateNotifUI() {
        const countBadge = document.getElementById('notifCount');
        countBadge.innerText = unreadNotifications.length;

        const listDiv = document.getElementById('notifList');
        if (unreadNotifications.length === 0) {
            listDiv.innerHTML = "<p style='color:#718096; font-size:12px;'>Aucune nouvelle notification.</p>";
            return;
        }

        listDiv.innerHTML = "";
        unreadNotifications.forEach(notif => {
            listDiv.innerHTML += `
                <div class="notif-item">
                    <span>🔔 ${notif.details}</span>
                    <button class="btn-success" style="padding:4px 8px; font-size:11px;" onclick="markAsRead('${notif._id}', '${notif.details}')">Lu</button>
                </div>`;
        });
    }

    async function markAsRead(id, details) {
        try {
            const res = await fetch(`${API_BASE_URL}/notifications/${id}/read`, { method: 'PATCH' });
            if (res.ok) {
                // حفظ فـ الـ LocalStorage كما هو مطلوب ف الـ Cahier de charges (F10)
                let archived = JSON.parse(localStorage.getItem('read_notifications')) || [];
                archived.push({ id, details, readAt: new Date() });
                localStorage.setItem('read_notifications', JSON.stringify(archived));

                // تحديث اللائحة ف الحين بلا ريفريش
                unreadNotifications = unreadNotifications.filter(n => n._id !== id);
                updateNotifUI();
                showNotification("Notification marquée comme lue");
            }
        } catch (err) { console.error(err); }
    }

    function toggleNotifDropdown() {
        document.getElementById('notifDropdownSection').classList.toggle('hidden');
    }

    // ================= F7: BROUILLONS AUTOMATIQUES =================
    const fields = ['taskTitle', 'taskDesc'];
    fields.forEach(f => {
        document.getElementById(f).addEventListener('input', () => {
            const draft = { title: document.getElementById('taskTitle').value, desc: document.getElementById('taskDesc').value };
            localStorage.setItem(`draft_${currentProjectId}`, JSON.stringify(draft));
        });
    });

    function checkDraft() {
        const saved = localStorage.getItem(`draft_${currentProjectId}`);
        if (saved) {
            const draft = JSON.parse(saved);
            if ((draft.title || draft.desc) && confirm("🔄 Brouillon trouvé. Restaurer ?")) {
                document.getElementById('taskTitle').value = draft.title || "";
                document.getElementById('taskDesc').value = draft.desc || "";
            }
        }
    }

    // ================= GESTION DES TÂCHES (F3 & F9) =================
    async function addTask() {
        const title = document.getElementById('taskTitle').value;
        const desc = document.getElementById('taskDesc').value;
        const priority = document.getElementById('taskPriority').value;

        if (!title) return showNotification("⚠️ Titre obligatoire", "urgent");

        const newTask = { id: Date.now(), title, description: desc, priority, status: 'En cours', createdAt: new Date().toLocaleString() };

        try {
            const res = await fetch(`${API_BASE_URL}/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newTask)
            });
            if (res.ok) {
                myTasks.unshift(newTask);
                localStorage.removeItem(`draft_${currentProjectId}`);
                saveAndRender();
                document.getElementById('taskTitle').value = "";
                document.getElementById('taskDesc').value = "";
                showNotification("✅ Tâche ajoutée et notifiée !");
                await loadActivities();
                await fetchNotifications();
            }
        } catch (err) {
            myTasks.unshift(newTask);
            saveAndRender();
        }
    }

    async function loadActivities() {
        try {
            const res = await fetch(`${API_BASE_URL}/projects/${currentProjectId}/activities`);
            if (res.ok) {
                const activities = await res.json();
                const feed = document.getElementById('activityFeed');
                if (activities.length === 0) return;
                feed.innerHTML = "";
                activities.forEach(act => {
                    feed.innerHTML += `<div style='font-size:12px; padding:5px 0; border-bottom:1px dashed #eee;'>⏰ <b>${new Date(act.timestamp).toLocaleTimeString()}</b> — ${act.details}</div>`;
                });
            }
        } catch (err) {}
    }

    function filterTasks() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.task-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(text) ? 'block' : 'none';
        });
    }

    function saveAndRender() {
        localStorage.setItem('my_tasks', JSON.stringify(myTasks));
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = "";
        myTasks.forEach(t => {
            list.innerHTML += `
                <div class="task-card ${t.priority === 'Urgent' ? 'urgent' : ''}">
                    <strong>${t.title}</strong>
                    <p>${t.description || ''}</p>
                    <div class="task-info">🕒 Créée le: ${t.createdAt} | Statut: <b>${t.status}</b></div>
                </div>`;
        });
        document.getElementById('statAssigned').innerText = myTasks.length;
        document.getElementById('statCompleted').innerText = myTasks.filter(t => t.status === 'Terminée').length;
    }

    function showNotification(msg, type = 'success') {
        const n = document.getElementById('notification-msg');
        n.innerText = msg; n.style.color = (type === 'urgent') ? "#e74c3c" : "#27ae60";
        setTimeout(() => n.innerText = "", 3000);
    }

    function initApp() {
        renderTasks();
        loadActivities();
        checkDraft();
        fetchNotifications();
        
       
        setInterval(fetchNotifications, 30000);
    }

    window.onload = checkSession;
</script>
</body>
</html>
