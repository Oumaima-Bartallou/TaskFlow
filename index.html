    <h2>🚀 TaskFlow SMI S4</h2>

    <textarea id="taskDesc" placeholder="Description détaillée..."></textarea>

        <option value="Urgent">🔴 Priorité: URGENT</option>

<script>
    // Initialisation : Charger les tâches depuis le LocalStorage ou créer un tableau vide
    let myTasks = JSON.parse(localStorage.getItem('my_tasks')) || [];

    /**
     * AJOUTER UNE TÂCHE (Fonctionnalité 3 & 7)
     */
    function addTask() {
        const title = document.getElementById('taskTitle').value;
        const desc = document.getElementById('taskDesc').value;
        const priority = document.getElementById('taskPriority').value;

        // Validation simple
        if (!title) {
            showNotification("⚠️ Le titre est obligatoire", "urgent");
            return;
        }

        // Création de l'objet tâche avec horodatage (Fonctionnalité 10)
        const newTask = {
            id: Date.now(), // ID unique basé sur le temps
            title: title,
            description: desc,
            priority: priority,
            status: 'En cours',
            createdAt: new Date().toLocaleString(), // Date de création
            completedAt: null // Sera rempli une fois terminée
        };

        // Ajouter au début du tableau et sauvegarder
        myTasks.unshift(newTask);
        saveAndRender();
        
        // Réinitialiser les champs du formulaire
        document.getElementById('taskTitle').value = "";
        document.getElementById('taskDesc').value = "";

        // Notification visuelle (Fonctionnalité 9)
        if (priority === 'Urgent') {
            showNotification("🔥 Tâche URGENTE ajoutée !", "urgent");
        } else {
            showNotification("✅ Tâche ajoutée avec succès");
        }
    }

    /**
     * CHANGER LE STATUT (En cours / Terminée)
     */
    function toggleStatus(id) {
        myTasks = myTasks.map(task => {
            if (task.id === id) {
                if (task.status === 'En cours') {
                    task.status = 'Terminée';
                    task.completedAt = new Date().toLocaleString(); // Enregistrer la date de fin
                    showNotification("🎉 Félicitations ! Tâche terminée");
                } else {
                    task.status = 'En cours';
                    task.completedAt = null; // Réinitialiser la date de fin
                    showNotification("🔄 Tâche remise en cours");
                }
            }
            return task;
        });
        saveAndRender();
    }

    /**
     * SUPPRIMER UNE TÂCHE
     */
    function deleteTask(id) {
        if (confirm("Voulez-vous supprimer cette tâche ?")) {
            myTasks = myTasks.filter(task => task.id !== id);
            saveAndRender();
            showNotification("🗑️ Tâche supprimée", "urgent");
        }
    }

    /**
     * AFFICHER LES NOTIFICATIONS (Fonctionnalité 9)
     */
    function showNotification(msg, type = 'success') {
        const n = document.getElementById('notification-msg');
        n.innerText = msg;
        // Changer la couleur selon le type (Success ou Danger)
        n.style.color = (type === 'urgent') ? "#e74c3c" : "#27ae60";
        // Faire disparaître après 3 secondes
        setTimeout(() => n.innerText = "", 3000);
    }

    /**
     * RECHERCHE ET FILTRAGE (Fonctionnalité 6)
     */
    function filterTasks() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.task-card');
        cards.forEach(card => {
            const content = card.innerText.toLowerCase();
            // Afficher ou masquer selon la correspondance
            card.style.display = content.includes(text) ? 'block' : 'none';
        });
    }

    /**
     * SAUVEGARDER DANS LOCALSTORAGE ET ACTUALISER L'AFFICHAGE (Fonctionnalité 7)
     */
    function saveAndRender() {
        localStorage.setItem('my_tasks', JSON.stringify(myTasks));
        renderTasks();
    }

    /**
     * RENDU DE LA LISTE DANS LE HTML
     */
    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = ""; // Vider la liste avant d'afficher

        myTasks.forEach(task => {
            const isCompleted = task.status === 'Terminée';
            const isUrgent = task.priority === 'Urgent';

            list.innerHTML += `
                <div class="task-card ${isCompleted ? 'completed' : ''} ${isUrgent ? 'urgent' : ''}">
                    <strong>${isUrgent ? '⚠️ ' : ''}${task.title}</strong>
                    <p style="margin: 5px 0;">${task.description || '<i>Aucune description</i>'}</p>
                    
                    <div class="task-info">
                        🕒 Créée le: <b>${task.createdAt}</b><br>
                        ${task.completedAt ? `✅ Terminée le: <b>${task.completedAt}</b>` : `⏳ État: <b>${task.status}</b>`}
                    </div>
                    
                    <div class="actions">
                        <button class="btn-status" onclick="toggleStatus(${task.id})">
                            ${isCompleted ? 'Réouvrir' : 'Terminer'}
                        </button>
                        <button class="btn-delete" onclick="deleteTask(${task.id})">Supprimer</button>
                    </div>
                </div>
            `;
        });
    }

    // Charger les tâches au démarrage de la page
    window.onload = renderTasks;
</script>
