<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro - SMI S4</title>
    <style>
        :root { 
            --primary: #3498db; 
            --success: #27ae60; 
            --danger: #e74c3c; 
            --warning: #f1c40f;
            --dark: #2c3e50; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: var(--dark); }
        .container { max-width: 650px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin: auto; }
        
        /* 📊 Style des cartes statistiques du Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .stat-card { padding: 12px; border-radius: 12px; text-align: center; color: white; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-size: 13px; }
        .stat-projects { background: var(--primary); }
        .stat-assigned { background: var(--dark); }
        .stat-completed { background: var(--success); }
        .stat-overdue { background: var(--danger); }
        .stat-card span { display: block; font-size: 24px; margin-top: 5px; }

        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        #notification-msg { text-align: center; font-weight: bold; height: 25px; margin: 15px 0; }

        .task-card { background: #fff; border-left: 6px solid var(--primary); padding: 18px; margin-top: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .task-card.urgent { border-left-color: var(--danger); background: #fff5f5; }
        .task-card.completed { border-left-color: var(--success); opacity: 0.6; background: #f9f9f9; text-decoration: line-through; }
        
        .actions { margin-top: 12px; display: flex; gap: 10px; }
        .btn-status { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; flex: 1; }
        
        header { max-width: 650px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { background-color: #ff4d4d; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .search-box { margin: 20px 0; border-bottom: 2px solid #eee; padding-bottom: 15px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="margin: 0;">TaskFlow 🚀</h1>
            <p style="margin: 5px 0 0 0; color: #718096;">Plateforme collaborative pour SMI S4</p>
        </div>
        <button id="logoutBtn" class="btn-logout">Déconnexion</button>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card stat-projects">Projets Actifs <span id="countProjects">0</span></div>
            <div class="stat-card stat-assigned">Tâches Assignées <span id="countAssigned">0</span></div>
            <div class="stat-card stat-completed">Terminées <span id="countCompleted">0</span></div>
            <div class="stat-card stat-overdue">En Retard 🔥 <span id="countOverdue">0</span></div>
        </div>

        <h2>🚀 Ajouter une nouvelle tâche</h2>
        <input type="text" id="taskTitle" placeholder="Titre de la tâche..." required>
        <textarea id="taskDesc" placeholder="Description détaillée (optionnel)..."></textarea>
        <input type="date" id="taskDeadline" required> 
        
        <select id="taskPriority">
            <option value="Normal">🟢 Priorité: Normal</option>
            <option value="Urgent">🔴 Priorité: URGENT</option>
        </select>
        
        <button class="btn-add" onclick="addTask()">Ajouter au planning</button>
        <div id="notification-msg"></div>

        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTasks()" placeholder="🔍 Rechercher une tâche par titre...">
        </div>

        <h2>📋 Mes Tâches Actives (Triées par Priorité)</h2>
        <div id="taskList"></div>

        <div class="filter-section" style="margin-top: 30px;">
            <h3>⏳ Fil d'activités du Projet</h3>
            <div id="activityFeed" style="max-height: 200px; overflow-y: auto; padding: 12px; background: #fff; border-radius: 10px; border: 2px solid #edf2f7;">
                <p style="text-align:center; color:#718096;"><i>Aucune activité récente.</i></p>
            </div>
        </div>
    </div>

    <script>
        // Vérification de l'authentification via Token
        const token = localStorage.getItem('token');
        if (!token) {
            alert("Accès refusé. Veuillez vous connecter d'abord.");
            window.location.href = 'login.html';
        }

        // Configuration des URLs de l'API Backend
        const API_TASKS_URL = "http://127.0.0.1:3000/api/tasks";
        const API_PROJECTS_URL = "http://127.0.0.1:3000/api/projects"; 
        const API_DASHBOARD_URL = "http://127.0.0.1:3000/api/dashboard";
        
        let myTasks = [];
        let currentProjectId = "66463e2a9b1c2d3e4f5a6b7c"; // ID par défaut

        // 1. Récupérer ou créer automatiquement le projet parent
        async function getOrCreateProject() {
            try {
                const res = await fetch(API_PROJECTS_URL, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const projects = await res.json();
                    if (projects && projects.length > 0) {
                        currentProjectId = projects[0]._id;
                        console.log("🎯 Projet réel trouvé dans MongoDB:", currentProjectId);
                    } else {
                        const createRes = await fetch(API_PROJECTS_URL, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ name: "Mon Projet SMI", description: "Projet automatique" })
                        });
                        if (createRes.ok) {
                            const newProj = await createRes.json();
                            currentProjectId = newProj._id;
                            console.log("🆕 Nouveau projet créé automatiquement:", currentProjectId);
                        }
                    }
                }
            } catch (err) {
                console.log("⚠️ Erreur projet, utilisation de l'ID par défaut:", err);
            }
        }

        // 2. Charger les données statistiques du Dashboard et la liste globale
        async function loadDashboardData() {
            try {
                const res = await fetch(API_DASHBOARD_URL, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('countProjects').innerText = data.activeProjects || 0;
                    document.getElementById('countAssigned').innerText = data.totalAssigned || 0;
                    document.getElementById('countCompleted').innerText = data.completedTasks || 0;
                    document.getElementById('countOverdue').innerText = data.overdueTasks || 0;

                    myTasks = data.tasksList || [];
                    renderTasks();
                }
            } catch (err) {
                console.error("Erreur lors du chargement du dashboard:", err);
            }
        }

        // 3. Ajouter une tâche via POST API
        async function addTask() {
            const title = document.getElementById('taskTitle').value;
            const desc = document.getElementById('taskDesc').value;
            const priority = document.getElementById('taskPriority').value;
            const deadline = document.getElementById('taskDeadline').value; 

            if (!title || !deadline) {
                showNotification("⚠️ Le titre et la date limite sont obligatoires", "urgent");
                return;
            }

            const taskData = {
                title: title,
                description: desc || "Aucune description",
                status: "à faire", 
                priority: priority === "Urgent" ? "haute" : "moyenne",
                deadline: deadline,
                project: currentProjectId 
            };

            try {
                const res = await fetch(API_TASKS_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(taskData)
                });

                const data = await res.json();

                if (res.ok) {
                    showNotification(priority === 'Urgent' ? "🔥 Tâche URGENTE ajoutée !" : "✅ Tâche ajoutée avec succès");
                    document.getElementById('taskTitle').value = "";
                    document.getElementById('taskDesc').value = "";
                    document.getElementById('taskDeadline').value = "";
                    
                    await loadDashboardData(); 
                    await loadActivities(); // Recharger l'historique après l'ajout
                } else {
                    alert("Erreur du serveur: " + (data.message || "Impossible de créer la tâche"));
                }
            } catch (err) {
                console.error("Erreur lors de l'ajout:", err);
            }
        }

        // 4. Afficher les tâches dynamiquement dans le DOM
        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = ""; 

            if (!myTasks || myTasks.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#718096;"><i>Aucune tâche active pour le moment.</i></p>`;
                return;
            }

            myTasks.forEach(task => {
                const isCompleted = task.status === 'Terminée' || task.status === 'completed' || task.status === 'terminé';
                const isUrgent = task.priority === 'Urgent' || task.priority === 'urgente' || task.priority === 'haute';
                const dl = task.deadline ? new Date(task.deadline).toLocaleDateString() : 'Pas de date';

                list.innerHTML += `
                    <div class="task-card ${isCompleted ? 'completed' : ''} ${isUrgent ? 'urgent' : ''}">
                        <strong>${isUrgent ? '⚠️ ' : ''}${task.title}</strong>
                        <span style="font-size:11px; color:#718096;">[${task.priority}]</span>
                        <p style="margin: 5px 0;">${task.description || '<i>Aucune description</i>'}</p>
                        <small style="display:block; margin-bottom:8px; color:#718096;">Date limite: <b>${dl}</b> | Statut: <b>${task.status}</b></small>
                        
                        <div class="actions">
                            <button class="btn-status" onclick="toggleStatus('${task._id}', '${task.status}')">
                                ${isCompleted ? 'Réouvrir' : 'Terminer'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // 5. Mettre à jour le statut via PUT API
        async function toggleStatus(id, currentStatus) {
            const newStatus = (currentStatus === 'terminé' || currentStatus === 'Terminée') ? 'en cours' : 'terminé';
            try {
                const res = await fetch(`${API_TASKS_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (res.ok) {
                    showNotification("🔄 Statut mis à jour !");
                    await loadDashboardData(); 
                    await loadActivities(); // Recharger l'historique après modification
                }
            } catch (err) {
                console.error("Erreur de mise à jour:", err);
            }
        }

        // 6. ⏳ F9: Charger l'historique des activités depuis le serveur
        async function loadActivities() {
            try {
                const res = await fetch(`http://127.0.0.1:3000/api/projects/${currentProjectId}/activities`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const activities = await res.json();
                    const feed = document.getElementById('activityFeed');
                    
                    if (activities.length === 0) {
                        feed.innerHTML = "<p style='text-align:center; color:#718096;'><i>Aucune activité récente.</i></p>";
                        return;
                    }
                    
                    feed.innerHTML = "";
                    activities.forEach(act => {
                        const date = new Date(act.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const name = act.user ? act.user.name : 'Membre';
                        feed.innerHTML += `
                            <p style="font-size:13px; border-bottom:1px dashed #edf2f7; padding-bottom:5px; margin-bottom:5px;">
                                ⏰ <b>${date}</b> - <b>${name}</b> ${act.details}
                            </p>`;
                    });
                }
            } catch (err) { 
                console.error("Erreur activités:", err); 
            }
        }

        // 7. Filtrer localement dans la recherche par titre
        function filterTasks() {
            const text = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.task-card');
            cards.forEach(card => {
                const content = card.innerText.toLowerCase();
                card.style.display = content.includes(text) ? 'block' : 'none';
            });
        }

        // 8. Affichage des notifications éphémères de l'UI
        function showNotification(msg, type = 'success') {
            const n = document.getElementById('notification-msg');
            n.innerText = msg;
            n.style.color = (type === 'urgent') ? "#e74c3c" : "#27ae60";
            setTimeout(() => n.innerText = "", 3000);
        }

        // 9. Gestion de la déconnexion
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            alert('Déconnexion réussie.');
            window.location.href = 'login.html';
        });

        // 10. Initialisation au chargement de la page
        window.onload = async () => {
            await getOrCreateProject();
            await loadDashboardData(); 
            await loadActivities(); // Appel initial du fil d'activité
        };
    </script>
</body>
</html>
