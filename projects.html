<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Projets - TaskFlow</title>
    <style>
        :root { 
            --primary: #3498db; 
            --success: #27ae60; 
            --danger: #e74c3c; 
            --dark: #2c3e50; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: var(--dark); }
        .container { max-width: 700px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-primary { background: var(--primary); width: 100%; padding: 15px; border-radius: 10px; }
        .btn-danger { background: var(--danger); padding: 6px 12px; font-size: 12px; }
        .project-card { background: #fff; border: 2px solid #edf2f7; padding: 20px; margin-top: 15px; border-radius: 12px; }
        .member-badge { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 6px; margin: 4px; font-size: 12px; }
        .invite-section { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #edf2f7; display: flex; gap: 10px; }
        .invite-section input { margin: 0; flex: 1; padding: 8px; }
        header { max-width: 700px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { background-color: #ff4d4d; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="margin: 0;">TaskFlow 🚀</h1>
            <p style="margin: 5px 0 0 0; color: #718096;">Gestion des Projets — SMI S4</p>
        </div>
        <button id="logoutBtn" class="btn-logout">Déconnexion</button>
    </header>

    <div class="container">
        <h2>📁 Créer un Nouveau Projet</h2>
        <input type="text" id="projectTitle" placeholder="Titre du projet..." required>
        <textarea id="projectDesc" placeholder="Description du projet..."></textarea>
        <button class="btn btn-primary" onclick="createProject()">Créer le Projet</button>

        <hr style="margin: 30px 0; border: 1px solid #edf2f7;">

        <h2>📚 Mes Projets Actifs</h2>
        <div id="projectList">
            <p style="text-align:center; color:#718096;"><i>Chargement des projets...</i></p>
        </div>
    </div>

    <script>
        // 1. Vérification du Token d'authentification
        const token = localStorage.getItem('token');
        if (!token) {
            alert("Accès refusé. Veuillez vous connecter d'abord.");
            window.location.href = 'login.html';
        }

        const API_PROJECTS_URL = "http://127.0.0.1:3000/api/projects";

        // 2. Charger tous les projets depuis le serveur
        async function loadProjects() {
            try {
                const res = await fetch(API_PROJECTS_URL, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const projects = await res.json();
                    renderProjects(projects);
                } else {
                    document.getElementById('projectList').innerHTML = `<p style="color:red; text-align:center;">Erreur serveur lors du chargement.</p>`;
                }
            } catch (err) {
                console.error("Erreur:", err);
                document.getElementById('projectList').innerHTML = `<p style="color:red; text-align:center;">Impossible de connecter au serveur.</p>`;
            }
        }

        // 3. Afficher les projets dans le DOM avec gestion des membres (F8)
        function renderProjects(projects) {
            const list = document.getElementById('projectList');
            list.innerHTML = "";

            if (projects.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#718096;"><i>Aucun projet pour le moment.</i></p>`;
                return;
            }

            projects.forEach(proj => {
                // Générer les badges des membres avec bouton de suppression
                let membersHTML = "";
                if (proj.members && proj.members.length > 0) {
                    proj.members.forEach(m => {
                        membersHTML += `
                            <span class="member-badge">
                                👤 ${m.username} 
                                <button class="btn btn-danger" style="padding:2px 5px; margin-left:5px; border-radius:4px;" onclick="removeMember('${proj._id}', '${m._id}')">x</button>
                            </span>`;
                    });
                } else {
                    membersHTML = `<i style="font-size:12px; color:#718096;">Aucun membre invité.</i>`;
                }

                list.innerHTML += `
                    <div class="project-card">
                        <h3>📁 ${proj.title}</h3>
                        <p style="color:#4a5568;">${proj.description || 'Aucune description'}</p>
                        
                        <div style="margin-top:10px;">
                            <b style="font-size:13px;">Membres de l'équipe :</b><br>
                            <div style="margin-top:5px;">${membersHTML}</div>
                        </div>

                        <div class="invite-section">
                            <input type="email" id="email-${proj._id}" placeholder="Adresse email du membre à inviter...">
                            <button class="btn" style="background:var(--success); padding:8px 15px;" onclick="inviteMember('${proj._id}')">Inviter</button>
                        </div>
                    </div>
                `;
            });
        }

        // 4. Créer un nouveau projet (POST)
        async function createProject() {
            const title = document.getElementById('projectTitle').value;
            const description = document.getElementById('projectDesc').value;

            if (!title) {
                alert("Le titre du projet est obligatoire !");
                return;
            }

            try {
                const res = await fetch(API_PROJECTS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, description })
                });

                if (res.ok) {
                    document.getElementById('projectTitle').value = "";
                    document.getElementById('projectDesc').value = "";
                    await loadProjects(); // Recharger la liste
                } else {
                    alert("Erreur lors de la création du projet.");
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 5. [F8] Inviter un membre via son email
        async function inviteMember(projectId) {
            const emailInput = document.getElementById(`email-${projectId}`);
            const email = emailInput.value;

            if (!email) {
                alert("Veuillez saisir une adresse email !");
                return;
            }

            try {
                const res = await fetch(`${API_PROJECTS_URL}/${projectId}/invite`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                alert(data.message);
                
                if (res.ok) {
                    emailInput.value = "";
                    await loadProjects();
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 6. [F8] Retirer un membre du projet
        async function removeMember(projectId, memberId) {
            if (!confirm("Voulez-vous vraiment retirer ce membre du projet ?")) return;

            try {
                const res = await fetch(`${API_PROJECTS_URL}/${projectId}/members/${memberId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await res.json();
                alert(data.message);

                if (res.ok) {
                    await loadProjects();
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Déconnexion
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        // Chargement initial
        window.onload = loadProjects;
    </script>
</body>
</html>
