<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Connexion</title>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .error-msg { color: var(--danger); font-size: 14px; margin-top: 10px; display: none; font-weight: 500; }
        a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<div class="auth-container">
    <h2>Se connecter à TaskFlow 🔐</h2>
    <p style="color: #718096; font-size: 14px;">Plateforme collaborative pour SMI S4</p>
    
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Adresse Email..." required>
        <input type="password" id="loginPassword" placeholder="Mot de passe..." required>
        <button type="submit" class="btn">Se connecter</button>
    </form>

    <div id="errorBox" class="error-msg"></div>

    <p style="margin-top: 20px; font-size: 14px;">Vous n'avez pas de compte ? <a href="register.html">S'inscrire</a></p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorBox = document.getElementById('errorBox');
        
        errorBox.style.display = 'none';

        try {
            
            const response = await axios.post('http://127.0.0.1:3000/api/auth/login', {
                email,
                password
            });

            if (response.data.token) {
                
                localStorage.setItem('token', response.data.token);
                
                
                window.location.href = 'index.html';
            }
        } catch (error) {
            errorBox.style.display = 'block';
            if (error.response) {
                errorBox.innerText = error.response.data.message || "Identifiants incorrectes.";
            } else {
                errorBox.innerText = "Erreur: Impossible de connecter au serveur. Vérifiez index.js !";
            }
        }
    });
</script>

</body>
</html>
