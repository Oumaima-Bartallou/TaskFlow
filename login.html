<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - TaskFlow</title>
    <style>
        :root { 
            --primary: #3498db; 
            --dark: #2c3e50; 
            --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: var(--dark); }
        .container { max-width: 400px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin: 100px auto auto auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #error-msg { text-align: center; color: var(--danger); font-weight: bold; margin: 10px 0; height: 20px; }
        .link-register { text-align: center; margin-top: 20px; font-size: 14px; }
        .link-register a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 5px;">Se connecter à TaskFlow 🔐</h2>
        <p style="text-align: center; color: #718096; margin-top: 0; margin-bottom: 25px;">Plateforme collaborative pour SMI S4</p>
        
        <div id="error-msg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <label style="font-weight: bold;" for="email">Adresse Email :</label>
            <input type="email" id="email" placeholder="exemple@smi.com" required>
            
            <label style="font-weight: bold;" for="password">Mot de passe :</label>
            <input type="password" id="password" placeholder="••••••••" required>
            
            <button type="submit" class="btn-submit">Se connecter</button>
        </form>

        <div class="link-register">
            Vous n'avez pas de compte ? <a href="register.html">S'inscrire</a>
        </div>
    </div>

    <script>
        const API_AUTH_URL = "http://127.0.0.1:3000/api/auth/login";

        async function handleLogin(event) {
            event.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            
            errorDiv.innerText = ""; 

            try {
                const res = await fetch(API_AUTH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    
                    localStorage.setItem('token', data.token);
                    
                    
                    window.location.href = 'projets.html'; 
                } else {
                    
                    errorDiv.innerText = data.message || "Email ou mot de passe incorrect !";
                }
            } catch (err) {
                console.error("Erreur connexion:", err);
                errorDiv.innerText = "Erreur serveur lors de la connexion.";
            }
        }
    </script>
</body>
</html>
